kind = "web"
previewPath = "/"
title = "MyCommNet"
version = "1.0.0"
id = "artifacts/app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "PORT=3000 pnpm --filter @workspace/app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app", "run", "build" ]
publicDir = "artifacts/app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
